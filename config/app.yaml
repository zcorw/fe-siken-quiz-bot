  aliases:
    情報セキュリティ:
      - セキュリティ
      - 信息安全
      - 情报安全
    データベース:
      - DB
      - 数据库
    ネットワーク:
      - 网络
      - 通信ネットワーク
    コンピュータ構成要素:
      - 计算机组成
      - コンピュータ構成
    アルゴリズムとデータ構造:
