    - システム監査
    - 経営戦略
    - 企業活動
    - 法務
    - ビジネスインダストリ
    - システム戦略
    - マルチメディア・組込みシステム
    - AI・データサイエンス
    - 標準化
  high_weight_topics:
    - 情報セキュリティ
    - データベース
    - ネットワーク
    - コンピュータ構成要素
    - アルゴリズムとデータ構造
    - 基礎理論
    - オペレーティングシステム
    - システム構成要素
    - ソフトウェア開発技術
    - プロジェクトマネジメント
    - サービスマネジメント
    - システム監査
    - 経営戦略
    - 企業活動
    - 法務
