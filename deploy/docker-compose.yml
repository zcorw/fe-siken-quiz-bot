services:
  edge:
    image: nginx:1.27-alpine
    depends_on:
      - bot
      - web
    ports:
      - "${EDGE_HOST:-127.0.0.1}:${EDGE_PORT:-3100}:8080"
    restart: unless-stopped
    volumes:
      - ${HOST_DEPLOY_DIR:-.}/nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro

  web:
    image: ${WEB_IMAGE}
    user: "${APP_RUN_UID:-1000}:${APP_RUN_GID:-1000}"
    env_file:
      - path: ${HOST_ENV_FILE:-.env}
        required: false
    environment:
      APP_CONFIG_PATH: /app/config/app.yaml
      APP_DB_PATH: /app/data/app.sqlite
      QUESTION_DB_PATH: /app/data/fe_siken_questions.sqlite
    restart: unless-stopped
    volumes:
      - ${HOST_ASSETS_DIR:-../assets}:/app/public/assets:ro
      - ${HOST_CONFIG_DIR:-../config}:/app/config:ro
      - ${HOST_DATA_DIR:-../data}:/app/data

  bot:
    image: ${BOT_IMAGE}
    user: "${APP_RUN_UID:-1000}:${APP_RUN_GID:-1000}"
    env_file:
      - path: ${HOST_ENV_FILE:-.env}
        required: false
    environment:
      APP_CONFIG_PATH: /app/config/app.yaml
      APP_DB_PATH: /app/data/app.sqlite
      BOT_HOST: 0.0.0.0
      BOT_PORT: 3001
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      QUESTION_DB_PATH: /app/data/fe_siken_questions.sqlite
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_HEADER_SECRET: ${TELEGRAM_WEBHOOK_HEADER_SECRET:-}
      TELEGRAM_WEBHOOK_PATH_PREFIX: /telegram/webhook
      TELEGRAM_WEBHOOK_PATH_SECRET: ${TELEGRAM_WEBHOOK_PATH_SECRET:-}
      TELEGRAM_WEBHOOK_SECRET_TOKEN: ${TELEGRAM_WEBHOOK_SECRET_TOKEN:-}
    restart: unless-stopped
    volumes:
      - ${HOST_ASSETS_DIR:-../assets}:/app/assets:ro
      - ${HOST_CONFIG_DIR:-../config}:/app/config:ro
      - ${HOST_DATA_DIR:-../data}:/app/data

  migrate:
    image: ${MIGRATE_IMAGE}
    user: "${APP_RUN_UID:-1000}:${APP_RUN_GID:-1000}"
    env_file:
      - path: ${HOST_ENV_FILE:-.env}
        required: false
    environment:
      APP_CONFIG_PATH: /app/config/app.yaml
      APP_DB_PATH: /app/data/app.sqlite
      QUESTION_DB_PATH: /app/data/fe_siken_questions.sqlite
    profiles:
      - tools
    volumes:
      - ${HOST_CONFIG_DIR:-../config}:/app/config:ro
      - ${HOST_DATA_DIR:-../data}:/app/data
    command: ["pnpm", "db:migrate"]
