name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    timeout-minutes: 45

    outputs:
      web_image: ${{ steps.images.outputs.web_image }}
      bot_image: ${{ steps.images.outputs.bot_image }}
      migrate_image: ${{ steps.images.outputs.migrate_image }}
      image_repository: ${{ steps.images.outputs.image_repository }}
      image_tag: ${{ steps.images.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image names
        id: images
        run: |
          set -eu
          image_repository="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image_tag="${GITHUB_SHA}"

          echo "image_repository=${image_repository}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "web_image=ghcr.io/${image_repository}/web:${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "bot_image=ghcr.io/${image_repository}/bot:${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "migrate_image=ghcr.io/${image_repository}/migrate:${image_tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ${{ steps.images.outputs.web_image }}
            ghcr.io/${{ steps.images.outputs.image_repository }}/web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build and push bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.bot
          push: true
          tags: |
            ${{ steps.images.outputs.bot_image }}
            ghcr.io/${{ steps.images.outputs.image_repository }}/bot:latest
          cache-from: type=gha,scope=bot
          cache-to: type=gha,mode=max,scope=bot

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          target: builder
          push: true
          tags: |
            ${{ steps.images.outputs.migrate_image }}
            ghcr.io/${{ steps.images.outputs.image_repository }}/migrate:latest
          cache-from: type=gha,scope=migrate
          cache-to: type=gha,mode=max,scope=migrate

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-images
    timeout-minutes: 30

    steps:
      - name: Check deployment secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_DEPLOY_ROOT: ${{ secrets.VPS_DEPLOY_ROOT || '/opt/fe-quiz-bot' }}
          VPS_DEPLOY_DIR: ${{ secrets.VPS_DEPLOY_DIR || '' }}
          VPS_REPO_URL: ${{ secrets.VPS_REPO_URL || format('git@github.com:{0}.git', github.repository) }}
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL || 'http://127.0.0.1:3100' }}
        run: |
          set -eu

          missing=0
          for name in VPS_HOST VPS_USER VPS_SSH_KEY; do
            if [ -z "$(eval "printf '%s' \"\${${name}:-}\"")" ]; then
              echo "::error::Missing required GitHub secret: ${name}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          echo "Deployment preflight:"
          echo "- VPS_HOST is set"
          echo "- VPS_USER is set"
          echo "- VPS_SSH_KEY is set"
          echo "- VPS_SSH_PORT=${VPS_SSH_PORT}"
          echo "- VPS_DEPLOY_ROOT=${VPS_DEPLOY_ROOT}"
          if [ -n "${VPS_DEPLOY_DIR}" ]; then
            echo "- VPS_DEPLOY_DIR=${VPS_DEPLOY_DIR}"
          else
            echo "- VPS_DEPLOY_DIR=<default: ${VPS_DEPLOY_ROOT}/app>"
          fi
          echo "- VPS_REPO_URL is set"
          echo "- SMOKE_BASE_URL=${SMOKE_BASE_URL}"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          BRANCH: main
          DEPLOY_ROOT: ${{ secrets.VPS_DEPLOY_ROOT || '/opt/fe-quiz-bot' }}
          PROJECT_DIR: ${{ secrets.VPS_DEPLOY_DIR || '' }}
          REPO_URL: ${{ secrets.VPS_REPO_URL || format('git@github.com:{0}.git', github.repository) }}
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL || 'http://127.0.0.1:3100' }}
          IMAGE_REPOSITORY: ${{ needs.build-images.outputs.image_repository }}
          IMAGE_TAG: ${{ needs.build-images.outputs.image_tag }}
          WEB_IMAGE: ${{ needs.build-images.outputs.web_image }}
          BOT_IMAGE: ${{ needs.build-images.outputs.bot_image }}
          MIGRATE_IMAGE: ${{ needs.build-images.outputs.migrate_image }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: BRANCH,DEPLOY_ROOT,PROJECT_DIR,REPO_URL,SMOKE_BASE_URL,IMAGE_REPOSITORY,IMAGE_TAG,WEB_IMAGE,BOT_IMAGE,MIGRATE_IMAGE
          script_stop: true
          command_timeout: 30m
          script: |
            set -eu
            echo "[deploy] SSH connected."
            echo "[deploy] user=$(whoami)"
            echo "[deploy] host=$(hostname)"
            echo "[deploy] branch=${BRANCH}"
            echo "[deploy] deploy root=${DEPLOY_ROOT}"
            echo "[deploy] repo url is set"
            echo "[deploy] image repository=${IMAGE_REPOSITORY}"
            echo "[deploy] image tag=${IMAGE_TAG}"
            echo "[deploy] checking required commands..."
            command -v git
            command -v docker
            docker compose version

            if [ -z "${PROJECT_DIR}" ]; then
              PROJECT_DIR="${DEPLOY_ROOT}/app"
            fi
            echo "[deploy] project dir=${PROJECT_DIR}"
            echo "[deploy] deploy root listing:"
            ls -ld "${DEPLOY_ROOT}" || true
            ls -la "${DEPLOY_ROOT}" || true
            echo "[deploy] project dir listing:"
            if [ -d "${PROJECT_DIR}" ]; then
              ls -ld "${PROJECT_DIR}" || true
              ls -la "${PROJECT_DIR}" || true
            else
              echo "[deploy] project dir does not exist yet; it will be created by git clone."
            fi

            if [ ! -d "${PROJECT_DIR}/.git" ]; then
              echo "[deploy] project dir is not a git checkout; preparing initial clone."
              if [ -e "${PROJECT_DIR}" ]; then
                if [ -n "$(find "${PROJECT_DIR}" -mindepth 1 -maxdepth 1 -print -quit)" ]; then
                  echo "[deploy] project dir exists but is not an empty directory or git checkout: ${PROJECT_DIR}" >&2
                  echo "[deploy] move it away or remove it before first automated deployment." >&2
                  exit 1
                fi
                echo "[deploy] project dir exists and is empty; cloning into it."
              fi
              echo "[deploy] cloning repository."
              mkdir -p "$(dirname "${PROJECT_DIR}")"
              git clone --branch "${BRANCH}" "${REPO_URL}" "${PROJECT_DIR}"
            fi

            cd "${PROJECT_DIR}"
            echo "[deploy] fetching latest code."
            git fetch origin "${BRANCH}"
            git reset --hard "origin/${BRANCH}"
            echo "[deploy] running deploy script."
            sh ./deploy/scripts/deploy.sh
